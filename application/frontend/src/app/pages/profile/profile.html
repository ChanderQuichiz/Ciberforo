    <div class=" absolute w-5 top-3 right-3" >
      <button type="button" (click)="showDialog()" class="cursor-pointer">
        <img src="https://cdn-icons-png.flaticon.com/128/1159/1159633.png" alt="Abrir dialogo de edicion" />
      </button>
            <p-dialog header="Edit Profile" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
                <span class="p-text-secondary block mb-8">Update your information.</span>
                <div class="flex items-center gap-4 mb-4">
                    <label for="firstname" class="font-semibold w-24">First name</label>
                    <input pInputText id="firstname" class="flex-auto" autocomplete="off" />
                </div>
                 <div class="flex items-center gap-4 mb-4">
                    <label for="lastname" class="font-semibold w-24">Last name</label>
                    <input pInputText id="lastname" class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Email</label>
                    <input pInputText id="email" class="flex-auto" autocomplete="off" />
                </div>
                 <div class="flex items-center gap-4 mb-8">
                    <label for="password" class="font-semibold w-24">Password</label>
                    <input pInputText id="password" class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex justify-end gap-2">
                    <p-button label="Cancel" severity="secondary" (click)="visible = false" />
                    <p-button label="Save" (click)="visible = false" />
                </div>
            </p-dialog>

    </div>
