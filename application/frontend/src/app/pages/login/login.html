<div class="m-0 p-0 bg-white min-h-screen flex items-center justify-center">
  
  <div class="w-full max-w-6xl mx-auto px-8 flex items-center justify-around gap-12">
    
    <!-- Logo izquierda -->
    <div class="w-72 h-52 flex-shrink-0">
      <img src="ciberforo_logo.png" alt="CiberForo Logo" class="w-full h-full object-contain" />
    </div>
    
    <!-- Formulario de Login derecha -->
    <div class="w-full max-w-80">
      
      <h1 class="font-['Sarpanch',sans-serif] text-2xl text-black text-center mb-8">Login in to Ciberforo</h1>
      
      <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Campo EMAIL -->
        <div>
          <input 
            type="email" 
            placeholder="EMAIL"
            class="w-full h-12 bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="email"
          />
        </div>
        
        <!-- Campo PASSWORD -->
        <div>
          <input 
            type="password" 
            placeholder="PASSWORD"
            class="w-full h-12 bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="password"
          />
        </div>
        
        <!-- Bot¾n LOGIN -->
        <button 
          type="submit" 
          class="w-full h-12 bg-[#070707] border border-black rounded-2xl text-white text-xl font-['Protest_Riot',sans-serif] hover:bg-gray-900 transition-colors mt-6"
        >
          LOGIN
        </button>
        
      </form>
      
      <!-- Enlace crear cuenta -->
      <p class="text-center text-base font-['Sarpanch',sans-serif] text-[#2c2c2c] mt-6">
        New to Ciberforo? 
        <a href="/register" class="underline hover:text-black transition-colors">create account</a>
      </p>
      
    </div>
    
  </div>
  
</div>
