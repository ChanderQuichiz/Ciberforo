<div class="m-0 p-0 bg-white min-h-screen flex items-center justify-center">
  
  <div class="w-full max-w-6xl mx-auto px-8 flex items-center justify-center gap-18">
    
    <!-- Imagen decorativa izquierda -->
    <div class="w-[500px] h-[500px] flex-shrink-0">
      <img src="https://png.pngtree.com/png-clipart/20230914/original/pngtree-people-talking-clipart-four-people-talking-in-the-street-with-speech-png-image_12151686.png" alt="People chatting" class="w-full h-full object-contain" />
    </div>
    
    <!-- Formulario de Registro derecha -->
    <div class="w-full max-w-lg bg-[rgba(217,217,217,0.19)] border border-[rgba(0,0si,0,0.4)] rounded-[28px] p-12 shadow-[0px_4px_4px_0px_rgba(0,0,0,0.4)]">
      
      <h1 class="font-['Sarpanch',sans-serif] text-2xl text-black text-center mb-10">Register a new account</h1>
      
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Fila: FIRST NAME y LAST NAME -->
        <div class="grid grid-cols-2 gap-4">
          <input 
            type="text" 
            placeholder="FIRST NAME"
            class="flex-1 h-[50px] bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="firstName"
          />
          <input 
            type="text" 
            placeholder="LAST NAME"
            class="flex-1 h-[50px] bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="lastName"
          />
        </div>
        
        <!-- Campo EMAIL -->
        <div>
          <input 
            type="email" 
            placeholder="EMAIL"
            class="w-full h-[50px] bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="email"
          />
        </div>
        
        <!-- Campo PASSWORD -->
        <div>
          <input 
            type="password" 
            placeholder="PASSWORD"
            class="w-full h-[50px] bg-[#f3f2f2] border border-black rounded-2xl px-5 placeholder:text-[rgba(0,0,0,0.59)] placeholder:text-xs placeholder:font-['Sarpanch',sans-serif] focus:outline-none focus:ring-2 focus:ring-gray-400"
            formControlName="password"
          />
        </div>
        
        <!-- Botón CREATE ACCOUNT -->
        <button 
          type="submit" 
          class="w-full h-[50px] bg-[#070707] border border-black rounded-2xl text-white text-xl font-['Protest_Riot',sans-serif] hover:bg-gray-900 transition-colors mt-6"
        >
          Create account
        </button>
        
      </form>
      
      <!-- Enlace Sign in -->
      <p class="text-center text-base font-['Sarpanch',sans-serif] text-[#2c2c2c] mt-6">
        Already have an account?<a href="/" class="underline hover:text-black transition-colors">Sign in</a>
      </p>
      
    </div>
    
  </div>
  
</div>
